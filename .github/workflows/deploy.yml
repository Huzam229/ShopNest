name: Deploy Next.js (Clean Full Reset)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1️⃣ Install + Build on GitHub (NOT EC2)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build app
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NODE_ENV: production

      # 2️⃣ Create small deploy package (NO node_modules)
      - name: Create package
        run: tar -czf app.tar.gz .next public package.json package-lock.json

      # 3️⃣ Send to EC2
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "app.tar.gz"
          target: "~/ShopNest"

      # 4️⃣ Setup + Run on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p ~/ShopNest
            cd ~/ShopNest

            echo "Extracting build..."
            tar -xzf app.tar.gz

            echo "Creating env file..."
            cat <<EOF > .env.local
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NODE_ENV=production
            EOF

            echo "Installing ONLY production deps (first time only safe)"
            npm install --production

            echo "Starting app"
            pm2 delete shopnest || true
            pm2 start npm --name "shopnest" -- start
            pm2 save