name: Deploy Next.js (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build app with standalone output
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NODE_ENV: production

      # Fixed: Correct way to prepare standalone deploy package
      - name: Prepare standalone package
        run: |
          mkdir -p deploy
          # Copy the standalone folder contents
          cp -r .next/standalone/* deploy/
          # Copy static assets (important for CSS, JS chunks, images, etc.)
          mkdir -p deploy/.next/static
          cp -r .next/static/* deploy/.next/static/ 2>/dev/null || true
          # Copy public folder if it exists
          cp -r public deploy/public 2>/dev/null || true
          # Optional: keep package.json for reference
          cp package.json deploy/

      - name: Create tar package
        run: tar -czf app.tar.gz -C deploy .

      # Upload to EC2
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "app.tar.gz"
          target: "~/ShopNest"

      # Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ~/ShopNest

            echo "🧹 Cleaning old deployment..."
            rm -rf .next server.js public node_modules app.tar.gz *.js || true

            echo "📦 Extracting minimal standalone build..."
            tar -xzf app.tar.gz

            echo "🗑 Removing tar file..."
            rm -f app.tar.gz

            echo "⚙ Creating .env.local..."
            cat <<EOF > .env.local
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NODE_ENV=production
            PORT=3000
            EOF

            echo "♻ Restarting PM2..."
            pm2 delete shopnest || true
            pm2 start server.js --name "shopnest" --cwd ~/ShopNest
            pm2 save

            echo "✅ Deployment completed!"
            pm2 status
            echo "Recent logs:"
            pm2 logs shopnest --lines 30