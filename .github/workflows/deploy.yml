name: Deploy Next.js (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build with standalone output
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NODE_ENV: production

      # Improved: More robust standalone packaging
      - name: Prepare standalone package
        run: |
          mkdir -p deploy/.next/static
          cp -r .next/standalone/* deploy/ || true
          cp -r .next/static/* deploy/.next/static/ 2>/dev/null || true
          cp -r public deploy/ 2>/dev/null || true
          cp package.json deploy/ 2>/dev/null || true

          # Debug: Show what will be deployed
          echo "=== Files in deploy folder ==="
          ls -la deploy
          du -sh deploy

      - name: Create tar package
        run: tar -czf app.tar.gz -C deploy .

      - name: Copy to EC2 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "app.tar.gz"
          target: "~/ShopNest"
          strip_components: 0
          debug: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ~/ShopNest

            echo "🧹 Cleaning old files..."
            rm -rf .next server.js public node_modules app.tar.gz *.js || true

            echo "📦 Extracting standalone build..."
            tar -xzf app.tar.gz

            echo "🗑 Removing tar..."
            rm -f app.tar.gz

            echo "⚙ Creating .env.local..."
            cat <<EOF > .env.local
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NODE_ENV=production
            PORT=3000
            EOF

            echo "♻ Starting PM2 with standalone..."
            pm2 delete shopnest || true
            pm2 start server.js --name "shopnest" --cwd ~/ShopNest
            pm2 save

            echo "✅ Deployment done!"
            pm2 status
            pm2 logs shopnest --lines 30