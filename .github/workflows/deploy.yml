name: Deploy Next.js (Standalone Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build app (standalone)
      - name: Build app
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_API_KEY }}
          CLOUDINARY_SECRET_KEY: ${{ secrets.CLOUDINARY_SECRET_KEY }}
          NEXT_PUBLIC_CLOUDINARY_UPDATE_PRESET: ${{secrets.NEXT_PUBLIC_CLOUDINARY_UPDATE_PRESET}}
          NODE_ENV: production

      # 5️⃣ Package only required files
      - name: Create deploy package
        run: |
          tar -czf app.tar.gz \
            .next/standalone \
            .next/static \
            public

      # 6️⃣ Upload to EC2
      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "app.tar.gz"
          target: "~/ShopNest"

      # 7️⃣ Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "🧹 Cleaning old build to free space..."
            pm2 delete shopnest || true
            rm -rf ~/ShopNest/.next ~/ShopNest/public
            npm cache clean --force 2>/dev/null || true

            mkdir -p ~/ShopNest
            cd ~/ShopNest

            echo "📦 Extracting new build..."
            tar -xzf app.tar.gz

            echo "🗑 Removing tar file immediately..."
            rm -f app.tar.gz

            echo "📁 Fixing standalone structure..."
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/

            echo "⚙ Creating environment file..."
            cat > .next/standalone/.env << 'EOF'
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_CLOUDINARY_API_KEY=${{ secrets.NEXT_PUBLIC_CLOUDINARY_API_KEY }}
            CLOUDINARY_SECRET_KEY=${{ secrets.CLOUDINARY_SECRET_KEY }}
            NEXT_PUBLIC_CLOUDINARY_UPDATE_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPDATE_PRESET }}
            NODE_ENV=production
            EOF
            echo "♻ Restarting PM2..."
            pm2 start .next/standalone/server.js --name shopnest
            pm2 save

            echo "✅ Deployment successful!"